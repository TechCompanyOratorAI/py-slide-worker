name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-vie poppler-utils libglib2.0-0 libgl1-mesa-dev libglib2.0-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-light.txt

      - name: Run syntax check
        run: |
          python -m py_compile worker.py
          python -m py_compile scripts/main.py
          python -m py_compile scripts/run_worker.py

      - name: Test imports
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')

          try:
              from config.config import validate_config
              print('✅ Config module works')
          except Exception as e:
              print(f'❌ Config failed: {e}')
              sys.exit(1)

          try:
              from src.processors import get_ocr_processor, get_slide_processor
              from src.clients import get_aws_client, get_webhook_client
              from src.handlers import get_message_handler
              print('✅ All modules importable')
          except Exception as e:
              print(f'❌ Module import failed: {e}')
              sys.exit(1)
          "

      - name: Check for TODO/FIXME
        run: |
          if grep -r "TODO\|FIXME\|XXX\|HACK" src/ config/ scripts/ --exclude-dir=__pycache__; then
            echo "⚠️ Found TODO/FIXME items - review before production"
          else
            echo "✅ No TODO/FIXME found"
          fi

      - name: Security check - no .env file
        run: |
          if [ -f .env ]; then
            echo "❌ .env file found - should not be in repository"
            exit 1
          else
            echo "✅ No .env file (good for security)"
          fi

      - name: ✅ Build Success
        run: |
          echo "🎉 Build completed successfully!"
          echo "📦 Ready for manual deployment to DigitalOcean"
          echo "🔧 Use the deployment files: Aptfile, requirements-light.txt, Procfile, runtime.txt"
