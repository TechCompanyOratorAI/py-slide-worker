# DigitalOcean App Platform specification
name: py-analysis-worker
region: sgp1

services:
- name: worker
  source_dir: /
  github:
    repo: your-username/py-analysis-worker
    branch: main
    deploy_on_push: true
  
  # Build configuration
  build_command: pip install -r requirements-light.txt
  
  # Runtime configuration  
  run_command: python3 worker.py
  
  # Environment
  environment_slug: python
  instance_count: 1
  instance_size_slug: basic-xxs
  
  # System packages via Aptfile
  buildpacks:
  - heroku/python
  - https://github.com/heroku/heroku-buildpack-apt
  
  # Environment variables (set these in DO dashboard)
  envs:
  - key: AWS_REGION
    value: ap-southeast-1
  - key: AWS_ACCESS_KEY_ID
    scope: RUN_TIME
    type: SECRET
  - key: AWS_SECRET_ACCESS_KEY
    scope: RUN_TIME
    type: SECRET
  - key: AWS_SQS_SLIDES_QUEUE_URL
    scope: RUN_TIME
    type: SECRET
  - key: WEBHOOK_URL
    value: https://node-api-service-uc69r.ondigitalocean.app/api/v1/webhooks/slides-complete
  - key: WEBHOOK_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: OCR_LANGUAGE
    value: vie+eng

# Health checks (optional)
health_check:
  # Since this is a worker, we can't do HTTP health checks
  # The worker will be considered healthy if it starts successfully